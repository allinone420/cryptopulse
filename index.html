<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>SatoCryp</title>
    <script>
      // Early robust polyfill for fetch and Telegram WebApp
      (function() {
        // 1. Fix fetch: Some environments have a read-only fetch getter. 
        // We try to make it writable before any library tries to patch it.
        try {
          var originalFetch = window.fetch;
          if (originalFetch) {
            // Bind to window to preserve context
            var boundFetch = originalFetch.bind(window);
            try {
              Object.defineProperty(window, 'fetch', {
                value: boundFetch,
                writable: true,
                configurable: true,
                enumerable: true
              });
            } catch (e1) {
              // If we can't redefine on window, try a more direct assignment if it's not a getter
              window.fetch = boundFetch;
            }
          }
        } catch (e) {
          console.warn("SatoCryp: Fetch polyfill failed, suppress assignment errors.");
        }

        // 2. Global Error Suppression for known harmless crashes
        window.addEventListener('error', function(ev) {
          var msg = ev.message || "";
          if (msg.indexOf('fetch') !== -1 && msg.indexOf('getter') !== -1) {
            ev.preventDefault();
            ev.stopImmediatePropagation();
            return true;
          }
          if (msg.indexOf('CloudStorage') !== -1 || msg.indexOf('version 6.0') !== -1) {
            ev.preventDefault();
            ev.stopImmediatePropagation();
            return true;
          }
        }, true);

        // 3. Telegram WebApp Mock/Polyfill
        var mockCS = {
          setItem: function(k, v, cb) { localStorage.setItem('_tg_'+k, v); if(cb)cb(null,true); return Promise.resolve(true); },
          getItem: function(k, cb) { var v = localStorage.getItem('_tg_'+k); if(cb)cb(null,v); return Promise.resolve(v); },
          getItems: function(ks, cb) { var r={}; ks.forEach(function(k){ r[k]=localStorage.getItem('_tg_'+k); }); if(cb)cb(null,r); return Promise.resolve(r); },
          removeItem: function(k, cb) { localStorage.removeItem('_tg_'+k); if(cb)cb(null,true); return Promise.resolve(true); },
          removeItems: function(ks, cb) { ks.forEach(function(k){ localStorage.removeItem('_tg_'+k); }); if(cb)cb(null,true); return Promise.resolve(true); },
          getKeys: function(cb) { var ks=Object.keys(localStorage).filter(function(k){return k.indexOf('_tg_')===0;}).map(function(k){return k.replace('_tg_','');}); if(cb)cb(null,ks); return Promise.resolve(ks); }
        };

        function applyTWA() {
          try {
            if (!window.Telegram) window.Telegram = {};
            if (!window.Telegram.WebApp) {
              window.Telegram.WebApp = {
                version: "7.10",
                platform: "unknown",
                initData: "",
                initDataUnsafe: {},
                ready: function(){},
                expand: function(){},
                close: function(){},
                HapticFeedback: { impactOccurred: function(){}, notificationOccurred: function(){}, selectionChanged: function(){} },
                MainButton: { show: function(){}, hide: function(){}, setText: function(){}, onClick: function(){}, offClick: function(){}, showProgress: function(){}, hideProgress: function(){} },
                BackButton: { show: function(){}, hide: function(){}, onClick: function(){}, offClick: function(){} },
                CloudStorage: mockCS
              };
            }
            var twa = window.Telegram.WebApp;
            // Force values
            if (twa.version !== "7.10") {
              try { Object.defineProperty(twa, 'version', { value: "7.10", writable: true, configurable: true }); } catch(e) { twa.version = "7.10"; }
            }
            if (!twa.CloudStorage) {
              try { Object.defineProperty(twa, 'CloudStorage', { value: mockCS, writable: true, configurable: true }); } catch(e) { twa.CloudStorage = mockCS; }
            }
          } catch(e) {}
        }

        applyTWA();
        var timer = setInterval(applyTWA, 200);
        setTimeout(function(){ clearInterval(timer); }, 10000);
      })();
    </script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="src/main.tsx"></script>
  </body>
</html>
